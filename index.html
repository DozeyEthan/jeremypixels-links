<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JeremyPixels</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="logo.png">
</head>
<body>

    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>

    <div class="container">
        <!-- Header Section -->
        <header class="profile-header">
            <div class="avatar">
                <img src="logo.png" alt="Jeremypixels Avatar">
            </div>
            <h1>Jeremypixels</h1>
            <p class="bio">Late-night POVs, memes, and digital chaos. Check out my content below! 👇</p>
        </header>

        <!-- Main Content Grid/Stack -->
        <main class="links-grid">
            <a href="https://www.youtube.com/@" target="_blank" class="link-card youtube">
                <span class="icon">
                    <img src="https://www.citypng.com/public/uploads/preview/hd-red-neon-youtube-yt-logo-symbol-sign-icon-png-701751695120411uecvkkjyek.png?v=2026051004" alt="YouTube Logo">
                </span>
                <div class="card-text">
                    <h3>YouTube</h3>
                    <p>Shorts & video essays</p>
                </div>
            </a>
            
            <a href="https://www.tiktok.com/@yourhandle" target="_blank" class="link-card tiktok">
                <span class="icon">
                    <img src="https://img.magnific.com/premium-vector/tik-tok-neon-logo_578229-216.jpg" alt="TikTok Logo">
                </span>
                <div class="card-text">
                    <h3>TikTok</h3>
                    <p>Daily POV clips</p>
                </div>
            </a>

            <a href="https://www.instagram.com/@yourhandle" target="_blank" class="link-card instagram">
                <span class="icon">
                    <img src="https://img.freepik.com/premium-vector/neon-instagram-logo-vector_742443-26.jpg" alt="Instagram Logo">
                </span>
                <div class="card-text">
                    <h3>Instagram</h3>
                    <p>Reels & updates</p>
                </div>
            </a>
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 Jeremypixels. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>
